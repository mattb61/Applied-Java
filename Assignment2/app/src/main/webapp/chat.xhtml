<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">
    <h:head>
        <title>Jakarta Facelets and JNDI DataSources</title>
    </h:head>
    <h:body>
        <!-- TODO: Only render this panel if userLoginBean's token is null -->
        <h:panelGroup id="login">
            <h1>Login / Signup</h1>
            <h:form>
                <h:outputLabel for="username">
                    <h:outputText value="Username: "/>
                </h:outputLabel>
                <!-- TODO: Set the userName field of the userLoginBean with an inputText. Make it required -->
                <h:outputLabel for="password">
                    <h:outputText value="Password: "/>
                </h:outputLabel>
                <!-- TODO: Set the userPassword field of the userLoginBean with an inputSecret. Make it required and set redisplay to false -->
                <!-- TODO: Create a button with the value "Login" that calls userLoginBean's updateToken method when clicked, executes the form, and renders all -->
                <!-- TODO: Create a button with the value "Sign-Up" that calls userLoginBean's signup method when clicked, executes the form, and renders all -->
                <h:messages />
                <h:outputText value="#{userLoginBean.message}" />
            </h:form>
        </h:panelGroup>
        <!-- TODO: Only render this panel if userLoginBean's token is not null -->
        <h:panelGroup id="server">
            <h1>Refresh Chat!</h1>
            <h:form>
                <!-- TODO: Create a button with the value "Refresh" that calls chatLogBean's pullLog method when clicked, executes the form, and renders chat -->
                <h:messages />
            </h:form>
            <h1>Post a Message!</h1>
            <h:form>
                <!-- TODO: Set the messageToPost field of the chatLogBean with an inputText. Make it required -->
                <h:inputText value="#{chatLogBean.messageToPost}" required="true"/>
                <!-- TODO: Create a button with the value "Post" that calls chatLogBean's postMessage method when clicked, executes the form, and renders chat -->
                <h:messages />
            </h:form>
            <h:panelGroup id="chat">
                <ui:repeat value="#{chatLogBean.chatLog}" var="p">
                    <p>#{p}</p>
                </ui:repeat>
            </h:panelGroup>
        </h:panelGroup>
    </h:body>
</html>
