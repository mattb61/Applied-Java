<!DOCTYPE html>
<html lang="en"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html">
    <h:head>
        <title>Jakarta Faces Guessing Game</title>
    </h:head>
    <h:body>
        <div id="top">
            <ui:insert name="top">Top Section</ui:insert>
        </div>
        <h1>Guessing Game!</h1>
        <h:form>
            <h:inputText value="#{guessing.guess}" required="true" />
            <h:commandButton value="Submit" action="#{guessing.submit}">
                <f:ajax execute="@form" render=":output" />
            </h:commandButton>
            <h:messages />
        </h:form>
        <h:outputText id="output" value="#{guessing.output}" />
    </h:body>
</html>
